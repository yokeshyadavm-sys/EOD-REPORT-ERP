<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP Task Manager - Create Task</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="dashboard-body">
    <div class="glass-panel form-container">
        <header class="form-header">
            <h2>Create New Task</h2>
            <button id="nav-back-btn" class="secondary-btn">🔙 Back to Dashboard</button>
        </header>

        <form id="create-task-form">
            <div class="input-group">
                <label for="task-title">Task Title</label>
                <input type="text" id="task-title" placeholder="What needs to be done?" required />
            </div>

            <div class="input-group">
                <label for="task-desc">Task Description</label>
                <textarea id="task-desc" rows="4" placeholder="Detailed description..." required></textarea>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label for="due-date">Due Date</label>
                    <input type="date" id="due-date" required />
                </div>
                <div class="input-group">
                    <label for="assign-to">Assign To</label>
                    <input type="text" id="assign-to" placeholder="e.g. John Doe (default: you)" />
                </div>
            </div>

            <div class="input-group">
                <label for="comments">Reason / Comments</label>
                <input type="text" id="comments" placeholder="Any initial comments?" />
            </div>

            <div class="checkbox-group">
                <label class="custom-checkbox-label">
                    <input type="checkbox" id="repeat-work" />
                    <span class="checkmark"></span>
                    Is this a repetition work? (Creates all day tasks from Mon-Sat)
                </label>
            </div>

            <button type="submit" class="primary-btn full-width">Create Task(s)</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
