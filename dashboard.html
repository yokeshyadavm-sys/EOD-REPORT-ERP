<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ERP Task Manager - Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="dashboard-body">
    <div class="glass-panel dashboard-container">
        <header class="dashboard-header">
            <div class="user-info">
                <div class="avatar" id="user-avatar">👤</div>
                <h2 id="display-name">Welcome, User</h2>
            </div>
            <button id="nav-create-btn" class="primary-btn flex-btn">
                <span>➕</span> Create Task
            </button>
        </header>

        <div class="table-container">
            <table id="tasks-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Task</th>
                        <th>Created Date</th>
                        <th>Due Date</th>
                        <th>Assigned By</th>
                        <th>Status</th>
                        <th>Reason/Comments</th>
                        <th>Completed Date</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="tasks-body">
                    <!-- Tasks will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal-overlay">
        <div class="glass-panel modal-content">
            <div class="modal-header">
                <h3>Task Description</h3>
                <button id="close-modal" class="icon-btn">❌</button>
            </div>
            <div class="modal-body">
                <p id="modal-desc-text"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
